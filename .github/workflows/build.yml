name: Build VST3

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
          - name: Windows
            os: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ matrix.os }}-juce-7.0.9

      - name: Configure
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            cmake -B build -G 'Unix Makefiles' -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=17
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=17
          fi

      - name: Build
        run: cmake --build build --config Release

      - name: Upload macOS
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Velvet-macOS
          path: |
            build/Velvet_artefacts/Release/VST3/
            build/Velvet_artefacts/Release/Standalone/
          if-no-files-found: warn

      - name: Upload Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Velvet-Windows
          path: build\\Velvet_artefacts\\Release\\VST3\\
          if-no-files-found: warn
